name: Build PDFs

on:
  push:
    branches: [main]
    paths:
      - 'tex/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'tex/**'
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            lmodern

      - name: Run sanitization checks
        run: make check

      - name: Compile all PDFs
        run: make all

      - name: Upload PDFs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: operation-fsoc-pdfs
          path: "*.pdf"
          retention-days: 30
